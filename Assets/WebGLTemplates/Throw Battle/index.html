<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>Unity Web Player | {{{ PRODUCT_NAME }}}</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="shortcut icon" href="TemplateData/ThrowBattle.png?v=1">
    <link rel="icon" type="image/png" href="TemplateData/ThrowBattle.png?v=1">    
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      /* 強制讓網頁滿版且不出現捲軸 */
      html, body { 
        background-color: #000;
        margin: 0;
        padding: 0;
        overflow: hidden; 
        display: flex;
        justify-content: center;
        align-items: center;
        /* 修正手機網址列高度 */
        height: calc(var(--vh, 1vh) * 100);
        width: 100vw;
      }
      
      /* 核心修正：讓容器本身就鎖定 1792:768 比例 */
      #unity-container {
        position: relative;
        /* 寬度最大為 100%，高度最大為 100% 可視高度 */
        width: 100%;
        height: 100%;
        max-width: calc(calc(var(--vh, 1vh) * 100) * 2.33333333); /* 100vh * 1792 / 768 */
        max-height: calc(100vw * 0.42857143); /* 100vw * 768 / 1792 */
        
        /* 鎖定 1792:768 比例 */
        aspect-ratio: 1792 / 768; 
        
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
      }

      /* Canvas 填滿容器 */
      #unity-canvas {
          width: 100% !important;
          height: 100% !important; 
          object-fit: contain !important; 
          background: #000;

          image-rendering: -moz-crisp-edges;    /* Firefox */
          image-rendering: -webkit-crisp-edges; /* Safari */
          image-rendering: pixelated;           /* Chrome / Edge / Opera */
      }

      /* 行動端與桌面端套用相同的邏輯 */
      #unity-container.unity-mobile #unity-canvas {
          width: 100% !important;
          height: 100% !important;
      }

      /* 隱藏底部的工具欄 */
      #unity-footer { display: none !important; }
      
      /* 讓載入條與 Logo 居中 */
      #unity-loading-bar { 
        position: absolute; 
        left: 50%; 
        top: 50%; 
        transform: translate(-50%, -50%); 
        display: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>

    <script>
      // 修正手機動態高度 (網址列與工具欄)
      function resetHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      window.addEventListener('resize', resetHeight);
      window.addEventListener('orientationchange', resetHeight);
      resetHeight();

      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      // 檢查行動裝置
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        // 高 DPI (Retina) 模糊修復
        const dpr = window.devicePixelRatio || 1;
        
        // 鎖定 Unity 內部渲染分辨率為 1792 x 768
        const baseWidth = 1792;
        const baseHeight = 768;
        
        canvas.width = baseWidth * dpr;
        canvas.height = baseHeight * dpr;

        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          window.unityInstance = unityInstance;
          document.querySelector("#unity-loading-bar").style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
